name: CI/CD

# The pipeline: on every push/PR to main, run the test suite FIRST. Only if it
# passes do we build the production image - and on a real push to main, publish
# that image to GitHub Container Registry (GHCR) as a deployable artifact.
# "Tests gate the build" is the whole point: a red suite never ships an image.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # match the Dockerfile base image
          cache: pip

      - name: Install dev + runtime deps
        run: pip install -r requirements-dev.txt

      - name: Run the suite
        # Tests use an in-memory SQLite DB and a disabled rate limiter, so no
        # external Postgres/Redis is needed in CI - the suite is self-contained.
        run: pytest -q

  image:
    name: Build & publish image
    needs: test                    # never build an image whose tests failed
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write              # required to push to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Only authenticate on a real push to main (PRs from forks can't get the token).
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (always) and push (main only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/vl4dimirz/secure-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
